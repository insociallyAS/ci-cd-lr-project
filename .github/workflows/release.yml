name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Create Release & Update README
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

      - name: Run build
        run: npm run build

      - name: Determine version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get Chuck Norris joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "joke=$JOKE" >> "$GITHUB_OUTPUT"

      - name: Get PR title
        id: pr
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            **PR Title:** ${{ steps.pr.outputs.title }}

            **Chuck Norris Joke:** ${{ steps.joke.outputs.joke }}

      - name: Update README.md
        run: |
          python3 - <<'EOF'
          import re

          version = "${{ steps.version.outputs.version }}"
          pr_title = """${{ steps.pr.outputs.title }}"""
          joke = """${{ steps.joke.outputs.joke }}"""

          block = f"""## Latest Release Info
          - Version: {version}
          - PR Title: {pr_title}
          - Chuck Norris Joke: {joke}
          """

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          pattern = r"## Latest Release Info\n(?:- .*\n?)*"
          if re.search(pattern, content):
              content = re.sub(pattern, block, content)
          else:
              content = content.rstrip() + "\n\n" + block

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(content)
          EOF

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet --cached || git commit -m "docs: update README with release info [skip ci]"
          git push origin main
